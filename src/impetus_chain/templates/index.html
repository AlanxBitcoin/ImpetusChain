<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Impetus Chain UI</title>
  <style>
    :root {
      --bg:#f6f8fc; --menu:#111827; --menu-ink:#e5e7eb; --panel:#ffffff;
      --ink:#111827; --muted:#4b5563; --line:#dbe2ef; --accent:#0284c7;
      --root:#fee2e2; --root-line:#ef4444; --l1:#dbeafe; --l1-line:#3b82f6;
      --l2:#ecfeff; --l2-line:#06b6d4;
    }
    body {
      margin:0; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink);
      background: radial-gradient(circle at 8% 0%, #e0f2fe 0%, transparent 36%),
                  radial-gradient(circle at 92% 100%, #dbeafe 0%, transparent 30%), var(--bg);
    }
    .top-menu { display:flex; flex-wrap:wrap; gap:14px; align-items:end; background:var(--menu);
      color:var(--menu-ink); padding:12px 16px; border-bottom:1px solid #1f2937; }
    .menu-item { min-width:260px; max-width:420px; }
    .menu-title { font-size:13px; margin-bottom:6px; color:#cbd5e1; }
    .row { display:flex; gap:8px; align-items:center; }
    .top-menu input[type="text"], .top-menu select { width:100%; box-sizing:border-box; padding:8px 10px;
      border-radius:8px; border:1px solid #374151; background:#0b1220; color:#e5e7eb; }
    .top-menu button { padding:8px 12px; border:1px solid #374151; border-radius:8px; background:#0ea5e9; color:#fff; cursor:pointer; white-space:nowrap; }
    .settings-overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(15,23,42,0.56); z-index:1000; padding:16px; }
    .settings-overlay.open { display:flex; }
    .settings-panel { width:min(680px,100%); background:#0f172a; color:#e5e7eb; border:1px solid #334155;
      border-radius:14px; padding:16px; box-shadow:0 16px 40px rgba(2,6,23,0.45); }
    .settings-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .settings-title { font-size:18px; font-weight:700; }
    .settings-close { border:1px solid #334155; background:#111827; color:#e5e7eb; border-radius:8px; padding:6px 10px; cursor:pointer; }
    .settings-panel input[type="password"], .settings-panel select { width:100%; box-sizing:border-box; padding:10px 12px;
      border-radius:8px; border:1px solid #334155; background:#020617; color:#e5e7eb; margin-top:6px; }
    .settings-panel button[type="submit"] { margin-top:12px; padding:10px 14px; border:1px solid #334155; border-radius:8px; background:#0ea5e9; color:#fff; cursor:pointer; }
    .layout { max-width:1380px; margin:16px auto; padding:0 16px 16px; display:grid; grid-template-columns:360px 1fr; gap:16px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; box-shadow:0 8px 28px rgba(15,23,42,0.06); }
    .panel h2 { margin:0 0 10px; font-size:19px; }
    .sub-title { color:var(--muted); margin-top:2px; margin-bottom:10px; font-size:13px; }
    label { display:block; margin:10px 0 6px; font-size:14px; font-weight:600; }
    input[type="text"], textarea, .panel select { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; color:var(--ink); background:#fff; }
    textarea { min-height:140px; resize:vertical; }
    .left-actions button { margin-top:10px; width:100%; padding:10px 12px; border:0; border-radius:10px; background:var(--accent); color:#fff; cursor:pointer; }
    .msg { margin-top:12px; padding:10px 12px; border-radius:10px; border:1px solid var(--line); color:__MSG_TONE__; background:#f8fafc; font-size:13px; word-break:break-word; }
    .analysis-box { margin-top:14px; border:1px solid var(--line); border-radius:10px; background:#f8fafc; padding:10px 12px; white-space:pre-wrap; font-size:13px; line-height:1.45; max-height:240px; overflow:auto; }
    .api-log-box { margin-top:8px; border:1px solid var(--line); border-radius:10px; background:#0b1220; color:#cbd5e1; padding:10px 12px; white-space:pre-wrap; font-size:12px; line-height:1.4; height:140px; overflow:auto; font-family:Consolas,Monaco,monospace; }
    .tree-wrap { min-height:560px; overflow:auto; }
    .mindmap { position:relative; min-width:760px; display:grid; grid-template-columns:1fr auto 1fr; gap:20px; align-items:center; }
    .link-layer { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:visible; }
    .link-root-l1 { stroke:var(--root-line); stroke-width:2; fill:none; opacity:0.9; }
    .link-l1-l2 { stroke:var(--l2-line); stroke-width:1.8; fill:none; opacity:0.85; }
    .center-node { position:relative; padding:14px 18px; border-radius:14px; border:2px solid var(--root-line); background:var(--root); font-weight:700; font-size:18px; text-align:center; white-space:nowrap; z-index:2; cursor:pointer; }
    .branch-column { display:flex; flex-direction:column; gap:14px; }
    .branch-item { position:relative; display:grid; gap:8px; }
    .branch-item .l1-node { padding:10px 12px; border-radius:12px; border:2px solid var(--l1-line); background:var(--l1); font-weight:600; width:fit-content; max-width:95%; text-align:left; cursor:pointer; z-index:2; }
    .branch-item .l2-list { margin:0; padding:0; list-style:none; width:fit-content; max-width:95%; }
    .branch-item .l2-list li { margin:6px 0; color:#155e75; border:1px solid var(--l2-line); border-radius:9px; background:var(--l2); padding:7px 10px; width:fit-content; max-width:100%; z-index:2; position:relative; cursor:pointer; }
    .branch-item .l2-list.collapsed { display:none; }
    .branch-column.left { align-items:end; text-align:right; }
    .branch-column.left .l2-list li { margin-left:auto; }
    .branch-column.right { align-items:start; text-align:left; }
    .node-selected { box-shadow:0 0 0 3px rgba(14,165,233,0.25), 0 8px 16px rgba(15,23,42,0.12); transform:translateY(-1px); }
    .empty { padding:12px; border-radius:10px; border:1px dashed #cbd5e1; color:var(--muted); background:#f8fafc; font-size:14px; }
    @media (max-width:960px) {
      .layout { grid-template-columns:1fr; }
      .mindmap { min-width:0; grid-template-columns:1fr; gap:12px; }
      .link-layer { display:none; }
      .branch-column.left, .branch-column.right { align-items:start; text-align:left; }
      .branch-column.left .l2-list li { margin-left:0; }
    }
  </style>
</head>
<body>
  <header class="top-menu">
    <div class="menu-item">
      <div class="menu-title">新建项目</div>
      <form method="post" action="/projects">
        <div class="row">
          <input name="project_name" type="text" placeholder="输入项目名称（推力来源）" required />
          <button type="submit">新建</button>
        </div>
      </form>
    </div>
    <div class="menu-item">
      <div class="menu-title">选择项目</div>
      <form method="get" action="/">
        <div class="row">
          <select name="project" onchange="this.form.submit()">__OPTIONS_HTML__</select>
        </div>
      </form>
    </div>
    <div class="menu-item">
      <div class="menu-title">设置</div>
      <div class="row"><button type="button" id="open-settings">打开设置</button></div>
    </div>
    <div class="menu-item">
      <div class="menu-title">分析节点</div>
      <form id="analyze-form" method="post" action="/analyze-node">
        <input type="hidden" name="project" value="__PROJECT_NAME__" />
        <input type="hidden" id="selected_node_input" name="selected_node" value="" />
        <div class="row">
          <select name="provider">__PROVIDER_OPTIONS_HTML__</select>
          <button type="submit">__BUTTON_TEXT__</button>
        </div>
      </form>
      <div class="menu-title" id="selected_node_label" style="margin-top:6px;">当前选中: 未选择</div>
    </div>
  </header>

  <div id="settings-modal" class="settings-overlay" aria-hidden="true">
    <div class="settings-panel" role="dialog" aria-modal="true" aria-label="设置">
      <div class="settings-head">
        <div class="settings-title">设置</div>
        <button type="button" class="settings-close" id="close-settings">关闭</button>
      </div>
      <div class="sub-title" style="color:#94a3b8;">输入 API Key 后会按项目加密保存到 core 目录。</div>
      <form method="post" action="/save-api-key">
        <input type="hidden" name="project" value="__PROJECT_NAME__" />
        <label>AI 提供方</label>
        <select name="provider">__PROVIDER_SIMPLE_HTML__</select>
        <label>API Key</label>
        <input type="password" name="api_key" placeholder="输入该提供方 API Key" />
        <button type="submit">保存 API Key</button>
      </form>
    </div>
  </div>

  <div class="layout">
    <aside class="panel">
      <h2>文本查看与输入区</h2>
      <div class="sub-title">编辑核心推力简介；分析会使用 core/analysis_strategy.yaml 和 core/ai_prompt.md。</div>
      <form method="post" action="/project-meta">
        <input type="hidden" name="project" value="__PROJECT_NAME__" />
        <label for="project_name_left">项目名称</label>
        <input id="project_name_left" type="text" value="__PROJECT_NAME__" readonly />
        <label for="core_intro">项目核心推力简介</label>
        <textarea id="core_intro" name="core_intro" placeholder="描述主推力的背景、影响机制与关键假设...">__CORE_INTRO__</textarea>
        <label>推力类型（由 API 自动识别）</label>
        <input type="text" value="__IMPETUS_TYPE_LABEL__" readonly />
        <label>持续时间预期（API 自动识别）</label>
        <input type="text" value="__DURATION_ESTIMATE__" readonly />
        <label>力量变化模式（API 自动识别）</label>
        <input type="text" value="__FORCE_PATTERN__" readonly />
        <label>影响力范围（全球金融市场市值变化，USD）</label>
        <input type="text" value="__IMPACT_RANGE__" readonly />
        <label>直接可投机对象（商品/股票/债券/货币等）</label>
        <input type="text" value="__DIRECT_SPEC_TARGETS__" readonly />
        <label>下一级展开（第五步，数组）</label>
        <input type="text" value="__NEXT_LEVEL_NODES_TEXT__" readonly />
        <div class="left-actions"><button type="submit">保存简介</button></div>
      </form>
      __MESSAGE_HTML__
      <label style="margin-top:14px;">最近一次分析结果</label>
      <div id="analysis-box" class="analysis-box">__LATEST_ANALYSIS__</div>
      <label style="margin-top:12px;">API 调用日志（实时）</label>
      <div id="api-log-box" class="api-log-box">等待分析开始...</div>
    </aside>
    <main class="panel tree-wrap">
      <h2>树状图（XMind 风格）</h2>
      <p class="sub-title">单击节点高亮选中；双击一级节点可展开/收缩其子分支。</p>
      __TREE_HTML__
    </main>
  </div>

  <script>
    window.IMPETUS_APP_STATE = __APP_STATE_JSON__;
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
